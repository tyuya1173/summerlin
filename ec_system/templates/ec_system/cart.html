<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ショッピングカート</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <main class="container py-5">
            <h2 class="h4 mb-4">ショッピングカート内の商品一覧</h2>

            <div class="card shadow-sm mb-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>商品名</th>
                                <th>商品の色</th>
                                <th>メーカー名</th>
                                <th class="text-end">単価</th>
                                <th style="width: 180px;">数量</th>
                                <th style="width: 90px;">削除</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for ci in cart_items %}
                            <tr>
                                <td>{{ ci.item.name }}</td>
                                <td>{{ ci.item.color }}</td>
                                <td>{{ ci.item.manufacturer }}</td>
                                <td class="text-end">{{ ci.item.price }}円</td>

                                <td>
                                    <form action="{% url 'ec_system:update_cart' ci.id %}" method="post" class="d-flex gap-1">
                                        {% csrf_token %}
                                        <input type="number" name="amountForm" value="{{ ci.amount }}" min="1" class="form-control form-control-sm" style="width: 80px;">
                                        <button type="submit" class="btn btn-sm btn-outline-primary">更新</button>
                                    </form>
                                </td>

                                <td>
                                    <form action="{% url 'ec_system:delete_from_cart' ci.id %}" method="post">
                                        {% csrf_token %}
                                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                                    </form>
                                </td>
                            </tr>
                            {% empty %}
                            <tr><td colspan="6" class="text-center text-muted py-4">カートに商品がありません</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <p class="fs-5 text-end">合計 <strong>{{ total }}</strong> 円</p>

            <div class="d-flex justify-content-between">
                <a href="{% url 'ec_system:index' %}" class="btn btn-outline-secondary">商品検索へ</a>

                <form action="{% url 'ec_system:purchase_confirm' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary">購入する</button>
                </form>
            </div>
        </main>
    </body>
</html>
