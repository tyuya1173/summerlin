<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>検索結果</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <main class="container py-5">
            <h2 class="h5 mb-4">キーワード "{{ keyword }}" / カテゴリ "{{ category }}" の検索結果</h2>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>商品名</th>
                                <th>色</th>
                                <th>メーカー</th>
                                <th class="text-end">価格</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in item %}
                            <tr>
                                <td><a href="{% url 'ec_system:item_detail' i.item_id %}">{{ i.name }}</a></td>
                                <td>{{ i.color }}</td>
                                <td>{{ i.manufacturer }}</td>
                                <td class="text-end">{{ i.price }}円</td>
                            </tr>
                            {% empty %}
                            <tr><td colspan="4" class="text-center text-muted py-4">該当する商品がありません</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-4">
                <a href="{% url 'ec_system:index' %}" class="btn btn-outline-secondary">商品検索へ</a>
            </div>
        </main>
    </body>
</html>
