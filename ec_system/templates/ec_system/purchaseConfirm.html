<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>購入確認</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <main class="container py-5" style="max-width: 720px;">
            <h2 class="h4 mb-4">購入内容の確認</h2>

            <div class="card shadow-sm mb-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>商品名</th>
                                <th class="text-end">単価</th>
                                <th class="text-end">数量</th>
                                <th class="text-end">小計</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for ci in cart_items %}
                            <tr>
                                <td>{{ ci.item.name }}</td>
                                <td class="text-end">{{ ci.item.price }}円</td>
                                <td class="text-end">{{ ci.amount }}個</td>
                                <td class="text-end">{{ ci.subtotal }}円</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <p class="fs-5 text-end">合計 <strong>{{ total }}</strong> 円</p>

            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <form action="{% url 'ec_system:purchase_commit' %}" method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">お届け先</label>
                            <input type="text" name="destination" value="{{ login_user.address }}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">お支払方法</label>
                            <select name="pay" class="form-select">
                                <option>代金引換</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <input type="submit" value="購入を確定する" class="btn btn-primary">
                        </div>
                    </form>
                </div>
            </div>

            <a href="{% url 'ec_system:cart' %}" class="btn btn-outline-secondary">カートに戻る</a>
        </main>
    </body>
</html>
