<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>管理者ログイン</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 420px;">
            <h2 class="h4 text-center mb-4">ログインしてください。</h2>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="{% url 'ec_system:admin_login' %}" method="POST">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            {% for error in form.non_field_errors %}
                                <div class="alert alert-danger py-2">{{ error }}</div>
                            {% endfor %}
                        {% endif %}
                        <div class="mb-3">
                            <th>{{ form.admin_id.label_tag }}</th>
                            <td>{{ form.admin_id }}</td>
                        </div>
                        <div class="mb-3">
                            <th>{{ form.password.label_tag }}</th>
                            <td>{{ form.password }}</td>
                        </div>
                        <div class="d-grid">
                            <td colspan="2" style="text-align: center;"><input type="submit" value="ログイン" class="btn btn-primary"></td>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
