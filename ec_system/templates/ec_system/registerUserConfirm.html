<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>会員情報の登録</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 520px;">
            <h2 class="h4 mb-4">以下の情報で登録しますか？</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="{% url 'ec_system:register_commit' %}" method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="password_confirm" value="{{ form.password_confirm.value }}">

                        <div class="mb-3">
                            <label class="form-label">会員ID</label>
                            <input type="text" name="user_id" value="{{ form.user_id.value }}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">パスワード</label>
                            <input type="password" name="password" value="{{ form.password.value }}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">お名前</label>
                            <input type="text" name="name" value="{{ form.name.value }}" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ご住所</label>
                            <input type="text" name="address" value="{{ form.address.value }}" class="form-control">
                        </div>

                        <div class="d-grid">
                            <input type="submit" value="登録" class="btn btn-primary">
                        </div>
                    </form>
                </div>
            </div>

            <p class="mt-3 mb-0">
                <a href="{% url 'ec_system:index' %}" class="btn btn-outline-secondary">商品検索へ</a>
            </p>
        </main>
    </body>
</html>
