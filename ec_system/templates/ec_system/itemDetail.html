<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>商品詳細</title>
    </head>
    <body>
        <h2>商品の詳細表示</h2>

        <table border="1">
            <tr>
                <th>商品名</th>
                <td>{{ item.name }}</td>
            </tr>
            <tr>
                <th>商品の色</th>
                <td>{{ item.color }}</td>
            </tr>
            <tr>
                <th>メーカー名</th>
                <td>{{ item.manufacturer }}</td>
            </tr>
            <tr>
                <th>価格</th>
                <td>{{ item.price }}</td>
            </tr>
            <tr>
                <th>在庫数</th>
                <td>{{ item.stock }}</td>
            </tr>
        </table>
        <form action="" method="POST">
            {% csrf_token %}
            {% for field in form %}
            {{ field.label}} {{ field }}
            {% endfor %}
        </form>
        <input type="submit" value="ショッピングカートに入れる"><br><br>
        <a href="{% url 'ec_system:index' %}">商品検索へ</a>
    </body>
</html>
