<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% if mode == 'register' %}商品登録{% else %}商品修正{% endif %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 560px;">
            <h2 class="h4 mb-4">{% if mode == 'register' %}商品の登録{% else %}商品の修正{% endif %}</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="post"
                          action="{% if mode == 'register' %}{% url 'ec_system:admin_item_register' %}{% else %}{% url 'ec_system:admin_item_edit' item.item_id %}{% endif %}">
                        {% csrf_token %}

                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                {% if mode == 'register' %}登録する{% else %}更新する{% endif %}
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <a href="{% url 'ec_system:admin_item_search' %}" class="btn btn-outline-secondary">商品一覧へ</a>
            </div>
        </main>
    </body>
</html>
