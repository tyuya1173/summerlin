<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>商品検索</title>
    </head>
    <body>
        <h2>商品の検索を行います。</h2>

        <form action="{% url 'ec_system:search_result' %}" method="POST">
            {% csrf_token %}
            <label>カテゴリ:</label>
            <select name="category" id="category-select">
            <option value="all">すべて</option>
            <option value="帽子">帽子</option>
            <option value="鞄">鞄</option>
            </select>

            <label>キーワード:</label>
            <input type="text" name="keyword" size="15" />
            <input type="submit" value="検索"/>
        </form><br>

        <a href="{% url 'ec_system:cart' %}">ショッピングカートを見る</a><br><br>

        {% if login_user %}
        <hr>
        <p>ようこそ {{ login_user.name }} さん</p>
        <ul>
            <li><a href="">会員情報の確認</a></li>
            <li><a href="">会員情報の変更</a></li>
            <li><a href="{% url 'ec_system:logout' %}">ログアウト</a></li>
        </ul>
        {% else %}
        <a href="{% url 'ec_system:login' %}">ログイン</a>
        {% endif %}
    </body>
</html>
