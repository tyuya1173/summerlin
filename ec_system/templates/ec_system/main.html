<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>商品検索</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <main class="container py-5" style="max-width: 720px;">
            <h2 class="h4 mb-4">商品の検索</h2>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form action="{% url 'ec_system:search_result' %}" method="POST">
                        {% csrf_token %}
                        <div class="row g-2 align-items-end">
                            <div class="col-sm-4">
                                <label class="form-label">カテゴリ</label>
                                <select name="category" id="category-select" class="form-select">
                                    <option value="all">すべて</option>
                                    <option value="帽子">帽子</option>
                                    <option value="鞄">鞄</option>
                                </select>
                            </div>
                            <div class="col-sm-5">
                                <label class="form-label">キーワード</label>
                                <input type="text" name="keyword" class="form-control" />
                            </div>
                            <div class="col-sm-3 d-grid">
                                <input type="submit" value="検索" class="btn btn-primary" />
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4">
                {% if login_user %}
                <a href="{% url 'ec_system:cart' %}" class="btn btn-outline-primary">ショッピングカートを見る</a>
                {% else %}
                <a href="{% url 'ec_system:login' %}" class="btn btn-outline-primary">ショッピングカートを見る</a>
                {% endif %}
                <a href="{% url 'ec_system:purchase_history' %}" class="btn btn-outline-primary">購入履歴</a>
                <a href="{% url 'ec_system:admin_login' %}" class="btn btn-outline-primary">管理者ページ</a>
            </div>

            {% if login_user %}
            <div class="card shadow-sm">
                <div class="card-body">
                    <p class="mb-3">ようこそ <strong>{{ login_user.name }}</strong> さん</p>
                    <div class="d-flex flex-wrap gap-2">
                        <a href="{% url 'ec_system:user_info' %}" class="btn btn-outline-secondary btn-sm">会員情報の確認</a>
                        <a href="{% url 'ec_system:update_user' %}" class="btn btn-outline-secondary btn-sm">会員情報の変更</a>
                        <a href="{% url 'ec_system:logout' %}" class="btn btn-outline-danger btn-sm">ログアウト</a>
                    </div>
                </div>
            </div>
            {% else %}
            <a href="{% url 'ec_system:login' %}" class="btn btn-success">ログイン</a>
            {% endif %}
        </main>
    </body>
</html>
