<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>商品一覧</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 720px;">
            <h2 class="h4 mb-4">商品一覧</h2>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form action="{% url 'ec_system:admin_item_search' %}" method="POST">
                        {% csrf_token %}
                        <div class="row g-2 align-items-end">
                            <div class="col-sm-4">
                                <label class="form-label">カテゴリ</label>
                                <select name="category" id="category-select" class="form-select">
                                    <option value="all"  {% if category == 'all' %}selected{% endif %}>すべて</option>
                                    <option value="帽子" {% if category == '帽子' %}selected{% endif %}>帽子</option>
                                    <option value="鞄" {% if category == '鞄' %}selected{% endif %}>鞄</option>
                                </select>
                            </div>
                            <div class="col-sm-5">
                                <label class="form-label">キーワード</label>
                                <input type="text" name="keyword" class="form-control" value="{{ keyword }}"/>
                            </div>
                            <div class="col-sm-3 d-grid">
                                <input type="submit" value="検索" class="btn btn-primary" />
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="d-flex justify-content-end mb-2">
                <a href="{% url 'ec_system:admin_item_register' %}" class="btn btn-success btn-sm">＋ 商品を登録</a>
            </div>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>商品名</th>
                                <th>色</th>
                                <th>メーカー</th>
                                <th class="text-end">価格</th>
                                <th class="text-center" style="width: 140px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in item %}
                            <tr>
                                <td><a href="{% url 'ec_system:item_detail' i.item_id %}">{{ i.name }}</a></td>
                                <td>{{ i.color }}</td>
                                <td>{{ i.manufacturer }}</td>
                                <td class="text-end">{{ i.price }}円</td>
                                <td class="text-center">
                                    <a href="{% url 'ec_system:admin_item_edit' i.item_id %}" class="btn btn-sm btn-outline-primary">修正</a>
                                    <form action="{% url 'ec_system:admin_item_delete' i.item_id %}" method="post" class="d-inline"
                                          onsubmit="return confirm('「{{ i.name }}」を削除しますか？');">
                                        {% csrf_token %}
                                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                                    </form>
                                </td>
                            </tr>
                            {% empty %}
                            <tr><td colspan="5" class="text-center text-muted py-4">該当する商品がありません</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-4">
                <a href="{% url 'ec_system:admin_top' %}" class="btn btn-outline-secondary">トップ画面へ</a>
            </div>
        </main>
    </body>
</html>
