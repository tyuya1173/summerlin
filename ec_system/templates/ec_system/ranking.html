<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>売れ筋ランキング</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <main class="container py-5" style="max-width: 720px;">
            <h2 class="h4 mb-4">よく購入されている商品はこちら</h2>

            <div class="card shadow-sm mb-4">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 80px;">順位</th>
                                <th>商品名</th>
                                <th class="text-end">価格</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in items %}
                            <tr>
                                <td class="text-center fw-bold">{{ forloop.counter }}位</td>
                                <td>
                                    <a href="{% url 'ec_system:item_detail' item.item_id %}">
                                        {{ item.name }}
                                    </a>
                                </td>
                                <td class="text-end">{{ item.price }}円</td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">
                                    商品がありません。
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

            <a href="{% url 'ec_system:index' %}" class="btn btn-outline-primary">トップへ戻る</a>
        </main>
    </body>
</html>
