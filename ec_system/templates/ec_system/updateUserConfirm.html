<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>会員情報の更新</title>
    </head>
    <body>
        <h2>以下の会員情報で更新しますか？</h2>

        <form action="{% url 'ec_system:update_user_commit' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="password_confirm" value="{{ form.password_confirm.value|default_if_none:'' }}">
            <table border="1">
                <tr>
                    <th>会員ID</th>
                    <td>{{ login_user.user_id }}</td>
                </tr>
                <tr>
                    <th>パスワード</th>
                    <td><input type="password" name="password" value="{{ form.password.value|default_if_none:'' }}"></td>
                </tr>
                <tr>
                    <th>お名前</th>
                    <td><input type="text" name="name" value="{{ form.name.value }}"></td>
                </tr>
                <tr>
                    <th>ご住所</th>
                    <td><input type="text" name="address" value="{{ form.address.value }}"></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="変更"></input></td>
                </tr>
            </table>
        </form>
        <br>
        <a href="{% url 'ec_system:index' %}">商品検索へ</a>
    </body>
</html>
