<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>会員登録</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 520px;">
            <h2 class="h4 mb-4">会員情報を登録してください</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="{% url 'ec_system:register_user' %}" method="post">
                        {% csrf_token %}

                        {% if form.non_field_errors %}
                        <div class="alert alert-danger py-2">{{ form.non_field_errors.0 }}</div>
                        {% endif %}

                        {% for field in form %}
                        <div class="mb-3">
                            {{ field.label_tag }}
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="d-grid">
                            <input type="submit" value="登録確認" class="btn btn-primary">
                        </div>
                    </form>
                </div>
            </div>

            <p class="mt-3 mb-0">
                <a href="{% url 'ec_system:index' %}" class="btn btn-outline-secondary">商品検索へ</a>
            </p>
        </main>
    </body>
</html>
