<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>購入完了</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 560px;">
            <div class="card shadow-sm text-center">
                <div class="card-body p-5">
                    <h2 class="h4 mb-4">ご購入ありがとうございました</h2>

                    <div class="card bg-light border-0 mb-4">
                        <div class="card-body text-start">
                            <p class="mb-2"><span class="text-muted">注文番号：</span><strong>{{ purchase.purchase_id }}</strong></p>
                            <p class="mb-0"><span class="text-muted">お届け先：</span>{{ purchase.destination }}</p>
                        </div>
                    </div>

                    <a href="{% url 'ec_system:index' %}" class="btn btn-primary">商品検索へ戻る</a>
                </div>
            </div>
        </main>
    </body>
</html>
