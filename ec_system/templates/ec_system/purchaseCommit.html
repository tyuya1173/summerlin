<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>購入完了</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="bg-light">
        <main class="container py-5" style="max-width: 560px;">
            <div class="card shadow-sm text-center">
                <div class="card-body p-5">
                    <h2 class="h4 mb-4">ご購入ありがとうございました</h2>

                    <div class="card bg-light border-0 mb-4">
                        <div class="card-body text-start">
                            <p class="mb-2">
                                <span class="text-muted">注文番号：</span>
                                <strong>{{ purchase.purchase_id }}</strong>
                            </p>

                            <p class="mb-0">
                                <span class="text-muted">お届け先：</span>
                                {{ purchase.destination }}
                            </p>
                        </div>
                    </div>

                    <div class="card border-0 mb-4">
                        <div class="card-body text-start">
                            <h3 class="h6 mb-3">お支払い・ポイント情報</h3>

                            <div class="d-flex justify-content-between border-bottom py-2">
                                <span class="text-muted">商品合計</span>
                                <strong>{{ total }} 円</strong>
                            </div>

                            <div class="d-flex justify-content-between border-bottom py-2">
                                <span class="text-muted">使用ポイント</span>
                                <strong>{{ use_point }} pt</strong>
                            </div>

                            <div class="d-flex justify-content-between border-bottom py-2">
                                <span class="text-muted">お支払い金額</span>
                                <strong class="text-primary">{{ payment_amount }} 円</strong>
                            </div>

                            <div class="d-flex justify-content-between border-bottom py-2">
                                <span class="text-muted">獲得ポイント</span>
                                <strong class="text-success">{{ earned_point }} pt</strong>
                            </div>

                            <div class="d-flex justify-content-between pt-2">
                                <span class="text-muted">現在の所持ポイント</span>
                                <strong>{{ login_user.point }} pt</strong>
                            </div>
                        </div>
                    </div>

                    <a href="{% url 'ec_system:index' %}" class="btn btn-primary">
                        商品検索へ戻る
                    </a>
                </div>
            </div>
        </main>
    </body>
</html>
