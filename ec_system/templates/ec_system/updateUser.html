<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>会員情報</title>
    </head>
    <body>
        <h2>会員情報</h2>

    <form action="{% url 'ec_system:update_user' %}" method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <div>{{ form.non_field_errors.0 }}</div>
        {% endif %}
        <table border="1">
            <tr>
                <th>会員ID:</th>
                <td>{{ login_user.user_id }}</td>
            </tr>
            {% for field in form %}
            <tr>
                <th>{{ field.label_tag }}</th>
                <td>
                    {{ field }}
                    {% if field.errors %}
                    <div>{{ field.errors.0 }}</div>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
            <tr>
                <td colspan="2" style="text-align: center;"><input type="submit" value="変更"></td>
            </tr>
        </table>
    </form>
    <br>
    <a href="{% url 'ec_system:withdraw_confirm' %}">退会する</a><br>
    <a href="{% url 'ec_system:index' %}">商品検索へ</a>
    </body>
</html>
