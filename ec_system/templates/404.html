<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ページが見つかりません</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f6f8;
    --card:#ffffff;
    --ink:#2c3140;
    --ink-soft:#7b8294;
    --face:#cfd4de;
    --accent:#4f6df5;
    --accent-dark:#3f59d4;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:var(--bg);
    font-family:"Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);
  }

  .card{
    background:var(--card);
    width:100%;
    max-width:420px;
    padding:52px 40px 44px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 12px 40px -16px rgba(44,49,64,.22);
  }

  .face{
    width:96px;
    height:96px;
    margin:0 auto 26px;
    display:block;
    color:var(--face);
  }

  .code{
    font-size:14px;
    font-weight:700;
    letter-spacing:.24em;
    color:var(--ink-soft);
    margin:0 0 10px;
  }

  h1{
    font-size:20px;
    font-weight:700;
    margin:0 0 10px;
  }

  p{
    font-size:14px;
    line-height:1.8;
    color:var(--ink-soft);
    margin:0 auto 28px;
    max-width:28ch;
  }

  .btn{
    display:inline-block;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    color:#fff;
    background:var(--accent);
    padding:12px 30px;
    border-radius:10px;
    transition:background .2s ease, transform .12s ease;
  }
  .btn:hover{ background:var(--accent-dark); }
  .btn:active{ transform:translateY(1px); }
  .btn:focus-visible{ outline:2px solid var(--accent-dark); outline-offset:3px; }
</style>
</head>
<body>
  <main class="card" role="alert">
    <!-- frown face -->
    <svg class="face" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="6"/>
      <circle cx="35" cy="42" r="5.5" fill="currentColor"/>
      <circle cx="65" cy="42" r="5.5" fill="currentColor"/>
      <path d="M34 70 Q50 56 66 70" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    </svg>

    <p class="code">404 NOT FOUND</p>
    <h1>ページが見つかりません</h1>
    <p>URL が間違っている可能性があります。</p>

    <a class="btn" href="{% url 'ec_system:index' %}">トップへ戻る</a>
  </main>
</body>
</html>
